<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; color: #24292e; max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
    h2 { border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; margin-top: 2em; }
    h3 { margin-top: 1.5em; }
    code { background: #f6f8fa; padding: 0.2em 0.4em; border-radius: 3px; font-size: 85%; }
    pre { background: #f6f8fa; padding: 1em; border-radius: 6px; overflow-x: auto; }
    pre code { background: none; padding: 0; font-size: 85%; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #dfe2e5; padding: 0.5em 1em; text-align: left; }
    th { background: #f6f8fa; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { margin-bottom: 2em; padding: 1em 0; border-bottom: 1px solid #eaecef; }
    nav a { margin-right: 1.5em; }
    .footer { margin-top: 3em; padding-top: 1em; border-top: 1px solid #eaecef; color: #6a737d; font-size: 0.85em; }
  </style>
</head>
<body>
  <nav>
    <strong><a href="{{ '/' | relative_url }}">Canton Keeper</a></strong>
    <a href="{{ '/install' | relative_url }}">Install</a>
    <a href="{{ '/config' | relative_url }}">Config</a>
    <a href="{{ '/examples' | relative_url }}">Examples</a>
    <a href="{{ '/rewards' | relative_url }}">Rewards</a>
  </nav>

  {{ content }}

  <div class="footer">
    Canton Keeper — Saxon Nodes Ltd
  </div>
</body>
</html>
